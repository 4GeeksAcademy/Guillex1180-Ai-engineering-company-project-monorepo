# TrackFlow Global Configuration
# Environment: Production
# Target: Warehouses (Los Angeles, Zaragoza)

app:
  name: "TrackFlow Logistics Core"
  version: "1.2.0"
  env: "production"

warehouses:
  - id: "WH-LA"
    location: "Los Angeles"
    country: "United States"
    capacity_limit: 150000
    active: true
  - id: "WH-ZAZ"
    location: "Zaragoza"
    country: "Spain"
    capacity_limit: 85000
    active: true

business_rules:
  scoring:
    threshold_min_score: 50.0
    weights:
      country_match: 20
      weight_capacity: 20
      priority_support: 15
      fragile_handling: 15
      reliability_factor: 0.3 # Multiplier for onTimeRate

  pricing_surcharges:
    priority_express: 0.30     # +30%
    priority_same_day: 0.60    # +60%
    priority_standard: 0.00    # +0%

  validation_limits:
    product_max_weight_kg: 100
    product_max_dim_cm: 200
    carrier_max_score: 100
    carrier_min_on_time_rate: 0
